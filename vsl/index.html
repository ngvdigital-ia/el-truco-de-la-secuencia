<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Clase desbloqueada: conoce el truco de la secuencia para levantar y moldear los glúteos.">
    <title>¡Clase desbloqueada! | El Truco de La Secuencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        font-family: Roboto, Arial, sans-serif;
        background: #fff;
        color: #000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #fff;
      }

      .page {
        width: min(100%, 1140px);
        margin: 0 auto;
        padding: 18px 20px 48px;
      }

      h1 {
        max-width: 980px;
        margin: 0 auto;
        font-size: 32px;
        font-weight: 600;
        line-height: 1.18;
        text-align: center;
      }

      .player-shell {
        position: relative;
        width: 100%;
        max-width: 400px;
        aspect-ratio: 9 / 16;
        margin: 42px auto 0;
        overflow: hidden;
        background: #000;
      }

      .player-pending {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: transparent;
        user-select: none;
      }

      @media (max-width: 767px) {
        .page {
          padding: 10px 10px 32px;
        }

        h1 {
          font-size: 24px;
          line-height: 1.2;
          text-align: left;
        }

        .player-shell {
          margin-top: 32px;
        }
      }
    </style>
  </head>
  <body>
    <!--
      Estado: waiting-video / waiting-tracking.
      Fonte visual: https://promocionhoy.com/clase-desbloqueada/
      O player e os pixels do concorrente não são carregados.
    -->
    <main
      class="page"
      data-offer="el-truco-de-la-secuencia"
      data-player-state="pending"
      data-checkout-url="https://pay.hotmart.com/P106215045W?checkoutMode=10&amp;utm_source=www.facebook.com&amp;sck=1784304401292_17843037286664&amp;src=www.facebook.com&amp;bid=1784303660666"
    >
      <h1>NUEVO DESCUBRIMIENTO: El truco de la secuencia para levantar y moldear los glúteos.</h1>

      <section class="player-shell" aria-label="Vídeo da oferta em preparação">
        <span class="player-pending">Vídeo em preparação</span>
      </section>
    </main>
  </body>
</html>
